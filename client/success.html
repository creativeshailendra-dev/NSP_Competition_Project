<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Registration Successful</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
    <link rel="stylesheet" href="./css/global.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: #f4f7fb;

      min-height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

      padding: 40px;
    }

    .success-card {
      width: 100%;

      max-width: 700px;

      background: #fff;

      border-radius: 25px;

      padding: 50px;

      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);

      text-align: center;
    }

    .success-icon {
      width: 110px;

      height: 110px;

      background: #16a34a;

      color: #fff;

      border-radius: 50%;

      display: flex;

      align-items: center;

      justify-content: center;

      font-size: 50px;

      margin: auto;

      margin-bottom: 25px;
    }

    .success-card h1 {
      font-size: 40px;

      color: #0f172a;

      margin-bottom: 15px;
    }

    .success-card p {
      color: #64748b;

      line-height: 1.8;

      margin-bottom: 30px;
    }

    .receipt-box {
      background: #f8fafc;

      border: 2px dashed #cbd5e1;

      border-radius: 20px;

      padding: 30px;

      text-align: left;

      margin-bottom: 30px;
    }

    .receipt-box h3 {
      margin-bottom: 20px;

      color: #0f172a;
    }

    .receipt-item {
      display: flex;

      justify-content: space-between;

      padding: 14px 0;

      border-bottom: 1px solid #e2e8f0;
    }

    .receipt-item:last-child {
      border: none;
    }

    .receipt-label {
      color: #64748b;

      font-weight: 500;
    }

    .receipt-value {
      color: #0f172a;

      font-weight: 700;
    }

    .button-group {
      display: flex;

      gap: 20px;

      justify-content: center;

      flex-wrap: wrap;
    }

    .action-btn {
      border: none;

      padding: 16px 28px;

      border-radius: 14px;

      font-size: 16px;

      font-weight: 600;

      cursor: pointer;

      transition: 0.3s;
    }

    .download-btn {
      background: #ea580c;

      color: #fff;
    }

    .print-btn {
      background: #0f172a;

      color: #fff;
    }

    .action-btn:hover {
      transform: translateY(-3px);
    }

    /* ==================================== */
/* MOBILE RESPONSIVE */
/* SUCCESS PAGE */
/* ==================================== */

@media(max-width:768px){

body{

padding:16px;

align-items:flex-start;

}

/* MAIN CARD */

.success-card{

padding:24px 18px;

border-radius:22px;

}

/* SUCCESS ICON */

.success-icon{

width:80px;

height:80px;

font-size:38px;

margin-bottom:20px;

}

/* TITLE */

.success-card h1{

font-size:28px;

line-height:1.3;

margin-bottom:12px;

}

/* TEXT */

.success-card p{

font-size:14px;

line-height:1.7;

margin-bottom:22px;

}

/* RECEIPT BOX */

.receipt-box{

padding:18px 14px;

border-radius:18px;

}

/* RECEIPT TITLE */

.receipt-box h3{

font-size:18px;

margin-bottom:16px;

}

/* RECEIPT ITEMS */

.receipt-item{

flex-direction:column;

align-items:flex-start;

gap:6px;

padding:12px 0;

}

/* LABEL */

.receipt-label{

font-size:13px;

}

/* VALUE */

.receipt-value{

font-size:15px;

word-break:break-word;

}

/* BUTTON GROUP */

.button-group{

flex-direction:column;

gap:14px;

}

/* BUTTON */

.action-btn{

width:100%;

padding:15px;

font-size:15px;

border-radius:12px;

}

}
  </style>
</head>

<body>
  <div class="success-card">
    <div class="success-icon">✓</div>

    <h1>Registration Successful</h1>

    <p>
      आपका आवेदन सफलतापूर्वक जमा हो चुका है। कृपया अपनी Registration ID
      सुरक्षित रखें।
    </p>

    <!-- RECEIPT -->

    <div class="receipt-box">
      <h3>📄 Registration Receipt</h3>

      <div class="receipt-item">
        <span class="receipt-label"> Registration ID </span>

        <span class="receipt-value" id="registrationId"> </span>
      </div>

      <div class="receipt-item">
        <span class="receipt-label"> Candidate Name </span>

        <span class="receipt-value" id="candidateName"> </span>
      </div>

      <div class="receipt-item">
        <span class="receipt-label"> Mobile Number </span>

        <span class="receipt-value" id="candidateMobile"> </span>
      </div>

      <div class="receipt-item">
        <span class="receipt-label"> Application Status </span>

        <span class="receipt-value"> Pending Verification </span>
      </div>
    </div>

    <!-- BUTTONS -->

    <div class="button-group">
      <button class="action-btn download-btn" onclick="downloadReceipt()">
        Download Receipt
      </button>

      <button class="action-btn print-btn" onclick="openReceiptPage()">
        Print Receipt
      </button>
    </div>
  </div>

  <script>
    // ====================================
    // GET LOCAL STORAGE DATA
    // ====================================

    const registrationId = localStorage.getItem("registrationId");

    const candidateName = localStorage.getItem("candidateName");

    const candidateMobile = localStorage.getItem("candidateMobile");

    // ====================================
    // SHOW DATA
    // ====================================

    document.getElementById("registrationId").innerText = registrationId;

    document.getElementById("candidateName").innerText = candidateName;

    document.getElementById("candidateMobile").innerText = candidateMobile;

    // ====================================
    // OPEN RECEIPT PAGE
    // ====================================

    function openReceiptPage() {
      window.location.href = "./receipt.html";
    }
    function downloadReceipt() {

window.location.href =
"./receipt.html";

}
  </script>
</body>

</html>
