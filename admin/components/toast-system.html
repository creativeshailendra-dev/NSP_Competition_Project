<!-- ====================================
TOAST CONTAINER
==================================== -->

<div class="toast-container">

    <!-- ====================================
    SUCCESS TOAST
    ==================================== -->

    <div class="premium-toast success-toast">

        <!-- ICON -->

        <div class="toast-icon">

            <i class="fa-solid fa-circle-check"></i>

        </div>

        <!-- CONTENT -->

        <div class="toast-content">

            <h4>
                Payment Successful
            </h4>

            <p>
                Registration payment received successfully.
            </p>

        </div>

        <!-- CLOSE -->

        <button class="toast-close">

            <i class="fa-solid fa-xmark"></i>

        </button>

        <!-- PROGRESS -->

        <div class="toast-progress"></div>

    </div>

    <!-- ====================================
    ERROR TOAST
    ==================================== -->

    <div class="premium-toast error-toast">

        <div class="toast-icon">

            <i class="fa-solid fa-circle-xmark"></i>

        </div>

        <div class="toast-content">

            <h4>
                Verification Failed
            </h4>

            <p>
                Candidate document verification failed.
            </p>

        </div>

        <button class="toast-close">

            <i class="fa-solid fa-xmark"></i>

        </button>

        <div class="toast-progress"></div>

    </div>

    <!-- ====================================
    WARNING TOAST
    ==================================== -->

    <div class="premium-toast warning-toast">

        <div class="toast-icon">

            <i class="fa-solid fa-triangle-exclamation"></i>

        </div>

        <div class="toast-content">

            <h4>
                Pending Action
            </h4>

            <p>
                Some registrations require manual review.
            </p>

        </div>

        <button class="toast-close">

            <i class="fa-solid fa-xmark"></i>

        </button>

        <div class="toast-progress"></div>

    </div>

</div>
