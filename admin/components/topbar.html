<!-- ====================================
MASTER TOPBAR
==================================== -->

<header class="master-topbar">

    <!-- LEFT SIDE -->

    <div class="topbar-left">

        <!-- SIDEBAR TOGGLE -->

        <button class="menu-toggle">

            <i class="fa-solid fa-bars"></i>

        </button>

        <!-- PAGE HEADING -->

        <div class="page-heading">

            <h1>
                Dashboard Overview
            </h1>

            <p>
                Welcome back 👋 Here’s your live portal analytics.
            </p>

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="topbar-right">

        <!-- GLOBAL SEARCH -->

        <div class="global-search">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input type="text" placeholder="Search applications, payments, users...">

        </div>

        <!-- QUICK ACTION -->

        <button class="topbar-icon-btn">

            <i class="fa-solid fa-plus"></i>

        </button>

        <!-- NOTIFICATION -->

        <button class="topbar-icon-btn notification-btn-topbar">

            <i class="fa-solid fa-bell"></i>

            <span class="notification-count">
                5
            </span>

        </button>

        <!-- MESSAGE -->

        <button class="topbar-icon-btn">

            <i class="fa-solid fa-envelope"></i>

            <span class="notification-count">
                2
            </span>

        </button>

        <!-- THEME -->

        <button class="topbar-icon-btn">

            <i class="fa-solid fa-moon"></i>

        </button>

        <!-- ADMIN ACCOUNT -->

        <div class="admin-account">

            <!-- IMAGE -->

            <img src="../assets/images/admin.jpg" alt="Admin">

            <!-- INFO -->

            <div class="admin-info">

                <h4>
                    Admin User
                </h4>

                <span>
                    Super Administrator
                </span>

            </div>

            <!-- DROPDOWN -->

            <i class="fa-solid fa-angle-down"></i>

        </div>

    </div>

</header>
