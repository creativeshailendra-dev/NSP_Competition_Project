<!-- ====================================
PROFILE DROPDOWN
==================================== -->

<div class="profile-dropdown">

    <!-- ====================================
    PROFILE HEADER
    ==================================== -->

    <div class="profile-dropdown-header">

        <!-- IMAGE -->

        <div class="profile-dropdown-image">

            <img src="../assets/images/admin.jpg" alt="Admin">

            <span class="profile-online-status"></span>

        </div>

        <!-- INFO -->

        <div class="profile-dropdown-info">

            <h3>
                Admin User
            </h3>

            <p>
                Super Administrator
            </p>

            <!-- BADGE -->

            <span class="badge approved-badge small-badge">

                Verified Account

            </span>

        </div>

    </div>

    <!-- ====================================
    SHORTCUTS
    ==================================== -->

    <div class="profile-shortcuts">

        <!-- ITEM -->

        <a href="#" class="profile-shortcut-item">

            <div class="shortcut-icon orange-shortcut">

                <i class="fa-solid fa-user"></i>

            </div>

            <div class="shortcut-content">

                <h4>
                    My Profile
                </h4>

                <p>
                    Manage your admin profile
                </p>

            </div>

        </a>

        <!-- ITEM -->

        <a href="#" class="profile-shortcut-item">

            <div class="shortcut-icon blue-shortcut">

                <i class="fa-solid fa-gear"></i>

            </div>

            <div class="shortcut-content">

                <h4>
                    Account Settings
                </h4>

                <p>
                    Update preferences & controls
                </p>

            </div>

        </a>

        <!-- ITEM -->

        <a href="#" class="profile-shortcut-item">

            <div class="shortcut-icon green-shortcut">

                <i class="fa-solid fa-shield-halved"></i>

            </div>

            <div class="shortcut-content">

                <h4>
                    Security Center
                </h4>

                <p>
                    Password & authentication controls
                </p>

            </div>

        </a>

    </div>

    <!-- ====================================
    DIVIDER
    ==================================== -->

    <div class="profile-divider"></div>

    <!-- ====================================
    DARK MODE
    ==================================== -->

    <div class="profile-mode-toggle">

        <div class="mode-info">

            <div class="mode-icon">

                <i class="fa-solid fa-moon"></i>

            </div>

            <div>

                <h4>
                    Dark Mode
                </h4>

                <p>
                    Switch dashboard appearance
                </p>

            </div>

        </div>

        <!-- SWITCH -->

        <label class="toggle-switch">

            <input type="checkbox">

            <span class="toggle-slider"></span>

        </label>

    </div>

    <!-- ====================================
    FOOTER ACTIONS
    ==================================== -->

    <div class="profile-footer-actions">

        <!-- HELP -->

        <button class="btn secondary-btn">

            <i class="fa-solid fa-headset"></i>

            Support

        </button>

        <!-- LOGOUT -->

        <button class="btn danger-btn">

            <i class="fa-solid fa-right-from-bracket"></i>

            Logout

        </button>

    </div>

</div>
